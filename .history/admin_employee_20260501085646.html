<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendify – Employee Management</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin_style.css"/>
  <link rel="stylesheet" href="admin_employee_style.css"/>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">Attendify</div>

    <div class="sidebar-item" onclick="window.location.href='admin_index.html'">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Attendance
    </div>

    <div class="sidebar-item active" onclick="window.location.href='admin_employee.html'">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/>
      </svg>
      Employee
    </div>

    <div class="sidebar-bottom">
      <div class="avatar-small" style="background: linear-gradient(135deg,#a78bfa,#7c3aed);">AD</div>
      <div class="user-info">
        <div class="user-name">Admin</div>
        <div class="user-role">HR Admin</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <h1>Employee Management</h1>
      <div class="dark-toggle" onclick="toggleDark()">
        <div class="toggle-dot"></div>
        Dark Mode
      </div>
    </header>

    <!-- Content -->
    <div class="content">

      <!-- Summary Strip -->
      <div class="emp-strip">
        <div class="emp-strip-card">
          <div class="emp-strip-icon" style="background:rgba(139,92,246,0.12); color:#8b5cf6;">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
          </div>
          <div>
            <div class="emp-strip-value" id="empTotal">0</div>
            <div class="emp-strip-label">Total Employees</div>
          </div>
        </div>
        <div class="emp-strip-card">
          <div class="emp-strip-icon" style="background:rgba(34,197,94,0.12); color:#22c55e;">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
          <div>
            <div class="emp-strip-value" id="empActive">0</div>
            <div class="emp-strip-label">Active</div>
          </div>
        </div>
        <div class="emp-strip-card">
          <div class="emp-strip-icon" style="background:rgba(239,68,68,0.12); color:#ef4444;">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          </div>
          <div>
            <div class="emp-strip-value" id="empInactive">0</div>
            <div class="emp-strip-label">Inactive</div>
          </div>
        </div>
        <div class="emp-strip-card">
          <div class="emp-strip-icon" style="background:rgba(59,130,246,0.12); color:#3b82f6;">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
          </div>
          <div>
            <div class="emp-strip-value" id="empDepts">0</div>
            <div class="emp-strip-label">Departments</div>
          </div>
        </div>
      </div>

      <!-- Employee Table Card -->
      <div class="card emp-card">

        <!-- Controls -->
        <div class="table-controls">
          <h3>Employees</h3>
          <div class="controls-right">
            <div class="search-wrap">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              <input type="text" id="empSearch" placeholder="Search name or email…" oninput="filterEmployees()"/>
            </div>
            <div class="dept-filter">
              <select id="empDeptFilter" onchange="filterEmployees()">
                <option value="">All Departments</option>
                <option value="IT">IT</option>
                <option value="Accounting">Accounting</option>
                <option value="HR">HR</option>
                <option value="Marketing">Marketing</option>
                <option value="Finance">Finance</option>
              </select>
            </div>
            <div class="dept-filter">
              <select id="empStatusFilter" onchange="filterEmployees()">
                <option value="">All Status</option>
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
            <button class="btn-add" onclick="openEmpModal()">+ Add Employee</button>
          </div>
        </div>

        <!-- Table -->
        <table>
          <thead>
            <tr>
              <th style="width:48px"></th>
              <th>Name</th>
              <th>Email</th>
              <th>Department</th>
              <th>Position</th>
              <th>Joined</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="empBody">
            <!-- Populated by admin_employee_app.js -->
          </tbody>
        </table>

        <!-- Empty state -->
        <div class="empty-state" id="empEmpty" style="display:none;">
          <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
          </svg>
          <p>No employees found</p>
        </div>

      </div><!-- /emp-card -->
    </div><!-- /content -->
  </div><!-- /main -->

  <!-- Add / Edit Employee Modal -->
  <div class="modal-overlay" id="empModalOverlay" onclick="closeEmpModalOutside(event)">
    <div class="modal" id="empModal">
      <div class="modal-header">
        <h2 id="empModalTitle">Add Employee</h2>
        <button class="modal-close" onclick="closeEmpModal()">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="empEditIndex" value="-1"/>
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="empFirstName" placeholder="e.g. John"/>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="empLastName" placeholder="e.g. Doe"/>
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="empEmail" placeholder="e.g. john.doe@company.com"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Department</label>
            <select id="empDept">
              <option value="IT">IT</option>
              <option value="Accounting">Accounting</option>
              <option value="HR">HR</option>
              <option value="Marketing">Marketing</option>
              <option value="Finance">Finance</option>
            </select>
          </div>
          <div class="form-group">
            <label>Position</label>
            <input type="text" id="empPosition" placeholder="e.g. Developer"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date Joined</label>
            <input type="date" id="empJoined"/>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="empStatus">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>
        </div>
        <div class="modal-error" id="empError"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeEmpModal()">Cancel</button>
        <button class="btn-save" onclick="saveEmployee()">Save</button>
      </div>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div class="modal-overlay" id="empConfirmOverlay" onclick="closeEmpConfirmOutside(event)">
    <div class="modal confirm-modal">
      <div class="modal-header">
        <h2>Remove Employee</h2>
        <button class="modal-close" onclick="closeEmpConfirm()">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:14px; color:var(--subtext);">Are you sure you want to remove <strong id="empConfirmName"></strong>?</p>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeEmpConfirm()">Cancel</button>
        <button class="btn-delete" onclick="confirmEmpRemove()">Remove</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="admin_employee_app.js"></script>
</body>
</html>
